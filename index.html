<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitação de Taxa Especial</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #38C252;
      --accent-light: #e8f8eb;
      --header-blue: #0F3875;
      --cyan: #29ABE2;
      --ink: #1a1a2e;
      --ink-soft: #3d3d5c;
      --ink-muted: #8888aa;
      --line: #d0d0e0;
      --bg: #f7f6f2;
      --white: #ffffff;
      --shadow: 0 2px 20px rgba(26,26,46,0.08);
      --radius: 4px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* ── Page header ── */
    .page-header {
      max-width: 780px;
      margin: 0 auto 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-mark {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
    }
    .page-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink-soft);
    }
    .page-header h1 strong {
      display: block;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--ink);
    }

    /* ── Card ── */
    .card {
      max-width: 780px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Cabeçalho azul ciano igual à imagem ── */
    .card-top {
      background: var(--cyan);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    #formTitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 2px;
      text-align: center;
      cursor: text;
      transition: border-color 0.2s;
    }
    #formTitle:focus { border-bottom-color: #fff; }
    .edit-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-top: 5px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .edit-hint svg { width: 10px; height: 10px; }

    /* ── Tabela de campos ── */
    .fields-table {
      width: 100%;
      border-collapse: collapse;
    }

    .fields-table tr {
      border-bottom: 1px solid var(--line);
      transition: background 0.15s;
    }
    .fields-table tr:last-child { border-bottom: none; }
    .fields-table tr:hover { background: #faf9f7; }
    .fields-table tr:focus-within { background: var(--accent-light); }

    /* Coluna esquerda — rótulo */
    .fields-table td.lbl {
      width: 200px;
      padding: 13px 16px 13px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-soft);
      border-right: 2px solid var(--line);
      vertical-align: middle;
      white-space: nowrap;
      transition: border-color 0.2s;
    }
    .fields-table tr:focus-within td.lbl {
      border-right-color: var(--accent);
    }

    /* Coluna direita — input */
    .fields-table td.val {
      padding: 8px 16px 8px 20px;
      vertical-align: middle;
    }

    .field-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 5px 6px;
      border-radius: var(--radius);
      transition: background 0.15s;
    }
    .field-input:focus { background: rgba(56,194,82,0.08); }
    .field-input::placeholder { color: var(--ink-muted); font-style: italic; }

    select.field-input { cursor: pointer; }

    textarea.field-input {
      resize: vertical;
      min-height: 72px;
      line-height: 1.6;
    }

    /* ── Actions ── */
    .actions {
      padding: 20px 24px 28px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.98); }

    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }
    .btn-ghost:hover { background: var(--bg); }

    .btn-primary {
      background: var(--header-blue);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-email {
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-email:hover { opacity: 0.88; }
    .btn-email svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--ink); color: #fff;
      padding: 12px 22px; border-radius: 30px;
      font-size: 0.85rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; pointer-events: none; z-index: 100;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 560px) {
      .fields-table td.lbl { width: 140px; font-size: 0.78rem; padding-left: 14px; }
      .card-top { padding: 14px 16px; }
      .actions { padding: 16px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1><strong>Solicitação de Taxa Especial</strong>Financiamento de Veículos</h1>
  </header>

  <div class="card">

    <!-- Título fixo -->
    <div class="card-top">
      <h2 id="formTitle" style="font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#fff;text-align:center;width:100%;">
        SOLICITAÇÃO DE TAXA ESPECIAL
      </h2>
    </div>

    <!-- Tabela de campos -->
    <form id="taxaForm" onsubmit="return false">
      <table class="fields-table">
        <tbody>

          <tr>
            <td class="lbl">DN</td>
            <td class="val"><input class="field-input" id="dn" type="text" placeholder="Número do DN..." /></td>
          </tr>

          <tr>
            <td class="lbl">Proposta</td>
            <td class="val"><input class="field-input" id="proposta" type="text" placeholder="Número da proposta..." /></td>
          </tr>

          <tr>
            <td class="lbl">Cliente</td>
            <td class="val"><input class="field-input" id="cliente" type="text" placeholder="Nome completo..." /></td>
          </tr>

          <tr>
            <td class="lbl">CPF/CNPJ</td>
            <td class="val"><input class="field-input" id="cpfCnpj" type="text" placeholder="Somente números..." maxlength="14" inputmode="numeric" /></td>
          </tr>

          <tr>
            <td class="lbl">Carro</td>
            <td class="val"><input class="field-input" id="carro" type="text" placeholder="Modelo do veículo..." /></td>
          </tr>

          <tr>
            <td class="lbl">Ano (Fab/Mod)</td>
            <td class="val"><input class="field-input" id="ano" type="text" placeholder="2024-2024" maxlength="9" /></td>
          </tr>

          <tr>
            <td class="lbl">Valor do Bem</td>
            <td class="val"><input class="field-input" id="valorBem" type="text" placeholder="R$ 0,00" /></td>
          </tr>

          <tr>
            <td class="lbl">Valor da Entrada</td>
            <td class="val"><input class="field-input" id="valorEntrada" type="text" placeholder="R$ 0,00" /></td>
          </tr>

          <tr>
            <td class="lbl">Prazo</td>
            <td class="val"><input class="field-input" id="prazo" type="number" min="1" max="120" placeholder="Ex: 48" /></td>
          </tr>

          <tr>
            <td class="lbl">Carência</td>
            <td class="val"><input class="field-input" id="carencia" type="number" min="0" max="180" placeholder="Ex: 30" /></td>
          </tr>

          <tr>
            <td class="lbl">Taxa</td>
            <td class="val"><input class="field-input" id="taxa" type="text" placeholder="Ex: 1,40%" maxlength="10" /></td>
          </tr>

          <tr>
            <td class="lbl">Conceito</td>
            <td class="val"><input class="field-input" id="conceito" type="text" placeholder="Ex: 4+" /></td>
          </tr>

          <tr>
            <td class="lbl">Motivo</td>
            <td class="val"><textarea class="field-input" id="motivo" placeholder="Descreva o motivo da solicitação..."></textarea></td>
          </tr>

          <tr>
            <td class="lbl">Email GCM</td>
            <td class="val"><input class="field-input" id="emailGcm" type="email" placeholder="email@exemplo.com.br" /></td>
          </tr>

        </tbody>
      </table>
    </form>

    <!-- Botões -->
    <div class="actions">
      <button class="btn btn-ghost" onclick="clearForm()">Limpar</button>
      <button class="btn btn-primary" onclick="saveForm()">Salvar</button>
      <button class="btn btn-email" onclick="sendEmail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        Enviar por E-mail
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    function g(id) { return document.getElementById(id).value.trim(); }

    // CPF/CNPJ — remove tudo que não for número
    document.getElementById('cpfCnpj').addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 14);
    });

    // Ano Fab/Mod — aceita hífen, barra ou texto livre (ex: 2017-2018 ou 2017/2018)
    document.getElementById('ano').addEventListener('input', function() {
      this.value = this.value.replace(/[^\d\-\/]/g, '').slice(0, 9);
    });

    // Máscara Taxa — só números, vírgula e %
    document.getElementById('taxa').addEventListener('blur', function() {
      let v = this.value.replace(/[^\d,\.]/g, '').replace(',', '.');
      if (v && !isNaN(parseFloat(v))) {
        this.value = parseFloat(v).toFixed(2).replace('.', ',') + '%';
      }
    });

    // Máscara valores monetários
    ['valorBem', 'valorEntrada'].forEach(id => {
      document.getElementById(id).addEventListener('blur', function() {
        let raw = this.value.replace(/[^\d,]/g, '').replace(',', '.');
        if (raw && !isNaN(parseFloat(raw))) {
          this.value = 'R$ ' + parseFloat(raw).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
        }
      });
    });

    function clearForm() {
      if (!confirm('Deseja limpar todos os campos?')) return;
      document.getElementById('taxaForm').reset();
    }

    function saveForm() {
      const data = {
        dn: g('dn'), proposta: g('proposta'),
        cliente: g('cliente'), cpfCnpj: g('cpfCnpj'), carro: g('carro'),
        ano: g('ano'), valorBem: g('valorBem'), valorEntrada: g('valorEntrada'),
        prazo: g('prazo'), carencia: g('carencia'), taxa: g('taxa'),
        conceito: g('conceito'), motivo: g('motivo'), emailGcm: g('emailGcm'),
        savedAt: new Date().toISOString()
      };
      localStorage.setItem('taxaEspecialForm', JSON.stringify(data));
      showToast('✓ Formulário salvo!');
    }

    function buildEmailHtml() {
      const titulo      = 'SOLICITAÇÃO DE TAXA ESPECIAL';
      const dn          = g('dn')          || '—';
      const proposta    = g('proposta')    || '—';
      const cliente     = g('cliente')     || '—';
      const cpfCnpj     = g('cpfCnpj')    || '—';
      const carro       = g('carro')       || '—';
      const ano         = g('ano')         || '—';
      const valorBem    = g('valorBem')    || '—';
      const valorEntrada= g('valorEntrada')|| '—';
      const prazo       = g('prazo')       || '—';
      const carencia    = g('carencia')    || '—';
      const taxa        = g('taxa')        || '—';
      const conceito    = g('conceito')    || '—';
      const motivo      = g('motivo')      || '—';
      const emailGcm    = g('emailGcm')    || '—';

      const row = (label, value) => `
        <tr>
          <td style="border:1px solid #ccc;padding:8px 14px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;color:#1a1a2e;width:180px;background:#f5f5f5;white-space:nowrap;">${label}</td>
          <td style="border:1px solid #ccc;padding:8px 14px;font-family:Arial,sans-serif;font-size:13px;color:#1a1a2e;">${value}</td>
        </tr>`;

      return `
<p style="font-family:Arial,sans-serif;font-size:13px;margin:0 0 4px 0;color:#000;">Prezado(a) Gestor(a),</p>
<p style="font-family:Arial,sans-serif;font-size:13px;margin:0 0 28px 0;color:#000;">Segue abaixo a solicitação de taxa especial para análise e aprovação.</p>
<table style="border-collapse:collapse;width:600px;border:1px solid #ccc;">
  <thead>
    <tr>
      <th colspan="2" style="background:#29ABE2;color:#fff;font-family:Arial,sans-serif;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:12px 14px;text-align:center;border:1px solid #29ABE2;">
        ${titulo}
      </th>
    </tr>
  </thead>
  <tbody>
    ${row('DN', dn)}
    ${row('Proposta', proposta)}
    ${row('Cliente', cliente)}
    ${row('CPF/CNPJ', cpfCnpj)}
    ${row('Carro', carro)}
    ${row('Ano (Fab/Mod)', ano)}
    ${row('Valor do Bem', valorBem)}
    ${row('Valor da Entrada', valorEntrada)}
    ${row('Prazo', prazo)}
    ${row('Carência', carencia)}
    ${row('Taxa', taxa)}
    ${row('Conceito', conceito)}
    ${row('Motivo', motivo)}
    ${row('Email GCM', `<a href="mailto:${emailGcm}" style="color:#0F3875;">${emailGcm}</a>`)}
  </tbody>
</table>`;
    }

    async function sendEmail() {
      const dn       = g('dn')       || '—';
      const proposta = g('proposta') || '—';
      const subject  = `Taxa Especial - DN ${dn} - Proposta ${proposta}`;
      const html    = buildEmailHtml();

      let copied = false;
      try {
        const blob = new Blob([html], { type: 'text/html' });
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
        copied = true;
      } catch(e) {
        try {
          const el = document.createElement('div');
          el.innerHTML = html;
          el.style.cssText = 'position:fixed;left:-9999px;top:0;pointer-events:none';
          document.body.appendChild(el);
          const range = document.createRange();
          range.selectNode(el);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          document.execCommand('copy');
          window.getSelection().removeAllRanges();
          document.body.removeChild(el);
          copied = true;
        } catch(e2) { copied = false; }
      }

      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}`;

      showToast(copied
        ? '📧 E-mail aberto! Cole com Ctrl+V no corpo.'
        : '📧 E-mail aberto! Cole o formulário manualmente.');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 5000);
    }

    // Restaurar dados salvos
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('taxaEspecialForm');
      if (!saved) return;
      try {
        const d = JSON.parse(saved);
        const set = (id, val) => { if (val && document.getElementById(id)) document.getElementById(id).value = val; };
        set('dn', d.dn); set('proposta', d.proposta);
        set('cliente', d.cliente); set('cpfCnpj', d.cpfCnpj); set('carro', d.carro);
        set('ano', d.ano); set('valorBem', d.valorBem); set('valorEntrada', d.valorEntrada);
        set('prazo', d.prazo); set('carencia', d.carencia); set('taxa', d.taxa);
        set('conceito', d.conceito); set('motivo', d.motivo); set('emailGcm', d.emailGcm);
      } catch(e) {}
    });
  </script>
</body>
</html>
